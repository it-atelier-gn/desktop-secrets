name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.goarch }} (${{ matrix.package }}, ${{ matrix.variant }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Windows amd64 — lite
          - os: windows
            runner: windows-latest
            goarch: amd64
            package: ./cmd/tplenv
            output: tplenv.exe
            variant: lite
            build_tags: ''
            artifact_name: tplenv-windows-amd64

          - os: windows
            runner: windows-latest
            goarch: amd64
            package: ./cmd/getsec
            output: getsec.exe
            variant: lite
            build_tags: ''
            artifact_name: getsec-windows-amd64

          # Windows amd64 — hardened
          - os: windows
            runner: windows-latest
            goarch: amd64
            package: ./cmd/tplenv
            output: tplenv.exe
            variant: hardened
            build_tags: hardened
            artifact_name: tplenv-windows-amd64-hardened

          - os: windows
            runner: windows-latest
            goarch: amd64
            package: ./cmd/getsec
            output: getsec.exe
            variant: hardened
            build_tags: hardened
            artifact_name: getsec-windows-amd64-hardened

          # Linux amd64 — lite
          - os: linux
            runner: ubuntu-latest
            goarch: amd64
            package: ./cmd/tplenv
            output: tplenv
            variant: lite
            build_tags: ''
            artifact_name: tplenv-linux-amd64

          - os: linux
            runner: ubuntu-latest
            goarch: amd64
            package: ./cmd/getsec
            output: getsec
            variant: lite
            build_tags: ''
            artifact_name: getsec-linux-amd64

          # Linux amd64 — hardened
          - os: linux
            runner: ubuntu-latest
            goarch: amd64
            package: ./cmd/tplenv
            output: tplenv
            variant: hardened
            build_tags: hardened
            artifact_name: tplenv-linux-amd64-hardened

          - os: linux
            runner: ubuntu-latest
            goarch: amd64
            package: ./cmd/getsec
            output: getsec
            variant: hardened
            build_tags: hardened
            artifact_name: getsec-linux-amd64-hardened

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.26'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Install systray dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libgtk-3-dev \
            pkg-config \
            libxxf86vm-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev


      - name: Build ${{ matrix.os }}-${{ matrix.goarch }} (${{ matrix.variant }})
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build ${{ matrix.build_tags != '' && format('-tags {0}', matrix.build_tags) || '' }} -ldflags "-X github.com/it-atelier-gn/desktop-secrets/internal/version.Version=${{ steps.version.outputs.version }} -X github.com/it-atelier-gn/desktop-secrets/internal/version.Revision=${{ github.sha }}" -o ${{ matrix.output }} ${{ matrix.package }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.output }}

  publish:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Prepare release files
        run: |
          mkdir -p release
          V=${{ steps.version.outputs.version }}
          cp getsec-linux-amd64/getsec            release/getsec-$V-linux-amd64
          cp getsec-linux-amd64-hardened/getsec   release/getsec-$V-linux-amd64-hardened
          cp getsec-windows-amd64/getsec.exe      release/getsec-$V-windows-amd64.exe
          cp getsec-windows-amd64-hardened/getsec.exe release/getsec-$V-windows-amd64-hardened.exe
          cp tplenv-linux-amd64/tplenv            release/tplenv-$V-linux-amd64
          cp tplenv-linux-amd64-hardened/tplenv   release/tplenv-$V-linux-amd64-hardened
          cp tplenv-windows-amd64/tplenv.exe      release/tplenv-$V-windows-amd64.exe
          cp tplenv-windows-amd64-hardened/tplenv.exe release/tplenv-$V-windows-amd64-hardened.exe

      - name: Generate SHA256 checksums
        run: |
          cd release
          sha256sum * > SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}